<!-- @dsCard group="Colors" viewport="700x160" subtitle="Market semantics: long / short + washes" name="Long / Short" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--pt-bg-0);padding:20px;font-family:var(--pt-font-mono);font-feature-settings:var(--pt-numeric)}</style>
</head><body>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
  <div style="background:var(--pt-long-wash);border:1px solid var(--pt-border);padding:12px;display:flex;justify-content:space-between;font-size:13px">
    <span style="color:var(--pt-long)">▲ LONG</span><span style="color:var(--pt-long)">+2.41%</span>
  </div>
  <div style="background:var(--pt-short-wash);border:1px solid var(--pt-border);padding:12px;display:flex;justify-content:space-between;font-size:13px">
    <span style="color:var(--pt-short)">▼ SHORT</span><span style="color:var(--pt-short)">−4.02%</span>
  </div>
</div>
<div style="display:flex;gap:24px;margin-top:14px;font-size:11px;color:var(--pt-fg-2)">
  <span>--pt-long #34D399</span><span>--pt-short #F87171</span><span>washes at ~10% alpha</span>
</div>
</body></html>
