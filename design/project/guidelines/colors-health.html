<!-- @dsCard group="Colors" viewport="700x130" subtitle="Account health thresholds" name="Health" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--pt-bg-0);padding:24px;font-family:var(--pt-font-mono);font-size:12px;display:flex;flex-direction:column;gap:14px}
.bar{height:6px;flex:1;background:var(--pt-bg-2)}</style>
</head><body>
<div style="display:flex;align-items:center;gap:12px"><span style="color:var(--pt-health-safe);width:110px">● safe</span><div class="bar"><div style="width:32%;height:100%;background:var(--pt-health-safe)"></div></div></div>
<div style="display:flex;align-items:center;gap:12px"><span style="color:var(--pt-health-warn);width:110px">● warn</span><div class="bar"><div style="width:68%;height:100%;background:var(--pt-health-warn)"></div></div></div>
<div style="display:flex;align-items:center;gap:12px"><span style="color:var(--pt-health-danger);width:110px">● danger</span><div class="bar"><div style="width:91%;height:100%;background:var(--pt-health-danger)"></div></div></div>
</body></html>
