<!-- @dsCard group="Colors" viewport="700x170" subtitle="Surface steps + hairlines (dark default)" name="Surfaces" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--pt-bg-0);padding:20px;font-family:var(--pt-font-mono)}
.sw{height:84px;border:1px solid var(--pt-border);display:flex;align-items:flex-end;padding:8px;font-size:10px;color:var(--pt-fg-2)}</style>
</head><body>
<div style="display:grid;grid-template-columns:repeat(6,1fr);gap:8px">
  <div class="sw" style="background:var(--pt-bg-0)">--pt-bg-0</div>
  <div class="sw" style="background:var(--pt-bg-1)">--pt-bg-1</div>
  <div class="sw" style="background:var(--pt-bg-2)">--pt-bg-2</div>
  <div class="sw" style="background:var(--pt-bg-3)">--pt-bg-3</div>
  <div class="sw" style="background:var(--pt-border)">--pt-border</div>
  <div class="sw" style="background:var(--pt-border-strong);color:var(--pt-fg-1)">--pt-border-strong</div>
</div>
<div style="margin-top:12px;font-size:11px;color:var(--pt-fg-2)">Hierarchy = surface steps + 1px hairlines. No shadows.</div>
</body></html>
