<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--pt-bg-0);padding:24px;font-family:var(--pt-font-mono);display:flex;flex-direction:column;gap:16px}</style>

  <span style="color:var(--pt-accent)">●</span><span style="color:var(--pt-fg-2)">→</span>
