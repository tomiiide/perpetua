<!-- @dsCard group="Colors" viewport="700x160" subtitle="data-theme=light scope" name="Light theme" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0}</style>
</head><body data-theme="light" style="background:var(--pt-bg-0);padding:20px;font-family:var(--pt-font-mono)">
<div style="display:grid;grid-template-columns:repeat(6,1fr);gap:8px">
  <div style="height:64px;background:var(--pt-bg-1);border:1px solid var(--pt-border);display:flex;align-items:flex-end;padding:8px;font-size:10px;color:var(--pt-fg-2)">bg-1</div>
  <div style="height:64px;background:var(--pt-bg-2);border:1px solid var(--pt-border);display:flex;align-items:flex-end;padding:8px;font-size:10px;color:var(--pt-fg-2)">bg-2</div>
  <div style="height:64px;background:var(--pt-accent);display:flex;align-items:flex-end;padding:8px;font-size:10px;color:var(--pt-accent-ink)">accent</div>
  <div style="height:64px;background:var(--pt-long);display:flex;align-items:flex-end;padding:8px;font-size:10px;color:#fff">long</div>
  <div style="height:64px;background:var(--pt-short);display:flex;align-items:flex-end;padding:8px;font-size:10px;color:#fff">short</div>
  <div style="height:64px;background:var(--pt-fg-0);display:flex;align-items:flex-end;padding:8px;font-size:10px;color:var(--pt-bg-0)">fg-0</div>
</div>
<div style="margin-top:12px;font-size:11px;color:var(--pt-fg-2)">Teal darkens to #0D9488 for contrast on light surfaces.</div>
</body></html>
