<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--pt-bg-0);padding:20px;font-family:var(--pt-font-mono)}
.sw{height:64px;display:flex;align-items:flex-end;padding:8px;font-size:10px}</style>
</head><body>
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">
  <div class="sw" style="background:var(--pt-accent);color:var(--pt-accent-ink)">--pt-accent 2DD4BF</div>
  <div class="sw" style="background:var(--pt-accent-strong);color:var(--pt-accent-ink)">--pt-accent-strong</div>
  <div class="sw" style="background:var(--pt-accent-dim);color:var(--pt-accent)">--pt-accent-dim</div>
  <div class="sw" style="background:var(--pt-accent-wash);border:1px solid var(--pt-border);color:var(--pt-accent)">--pt-accent-wash</div>
</div>
<div style="margin-top:12px;font-size:11px;color:var(--pt-fg-2)">Used sparingly: links, focus, live values, the P-candle body.</div>
</body></html>
