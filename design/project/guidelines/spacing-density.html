<!-- @dsCard group="Spacing" viewport="700x220" subtitle="Compact (default) vs comfortable rows" name="Density axis" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--pt-bg-0);padding:20px;font-family:var(--pt-font-mono);font-feature-settings:var(--pt-numeric);display:grid;grid-template-columns:1fr 1fr;gap:16px}
.row{height:var(--pt-row-h);display:flex;align-items:center;justify-content:space-between;padding:0 var(--pt-cell-pad-x);border-bottom:1px solid var(--pt-border);font-size:12px}
.lbl{font-size:10px;color:var(--pt-fg-2);letter-spacing:0.12em;margin-bottom:8px}</style>
</head><body>
<div>
  <div class="lbl">COMPACT · 24PX (DEFAULT)</div>
  <div style="border:1px solid var(--pt-border)">
    <div class="row"><span style="color:var(--pt-fg-1)">3,412.55</span><span style="color:var(--pt-long)">12.480</span></div>
    <div class="row"><span style="color:var(--pt-fg-1)">3,412.50</span><span style="color:var(--pt-long)">8.104</span></div>
    <div class="row" style="border-bottom:none"><span style="color:var(--pt-fg-1)">3,412.45</span><span style="color:var(--pt-long)">22.910</span></div>
  </div>
</div>
<div data-density="comfortable">
  <div class="lbl">COMFORTABLE · 32PX</div>
  <div style="border:1px solid var(--pt-border)">
    <div class="row"><span style="color:var(--pt-fg-1)">3,412.55</span><span style="color:var(--pt-long)">12.480</span></div>
    <div class="row"><span style="color:var(--pt-fg-1)">3,412.50</span><span style="color:var(--pt-long)">8.104</span></div>
    <div class="row" style="border-bottom:none"><span style="color:var(--pt-fg-1)">3,412.45</span><span style="color:var(--pt-long)">22.910</span></div>
  </div>
</div>
</body></html>
